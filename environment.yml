name: gis-zonal-stats
channels:
  - conda-forge
  - defaults

dependencies:
  # Python version
  - python=3.11

  # Core geospatial
  - gdal>=3.6
  - rasterio>=1.3
  - rasterstats>=0.19
  - geopandas>=0.13
  - pyproj>=3.5
  - shapely>=2.0
  - fiona>=1.9

  # Data science
  - numpy>=1.24
  - pandas>=2.0
  - scipy>=1.11

  # Visualisation
  - matplotlib>=3.7
  - seaborn>=0.12
  - folium>=0.14
  - mapclassify>=2.5       # Required for geopandas choropleth
  - branca>=0.6

  # Notebook
  - jupyter>=1.0
  - jupyterlab>=4.0
  - ipywidgets>=8.0
  - ipython>=8.0
  - nbformat>=5.7

  # I/O helpers
  - openpyxl>=3.1           # Excel export
  - pyarrow>=12.0           # Parquet support

  # Utilities
  - tqdm>=4.65
  - colorama>=0.4

  # Pip-only packages
  - pip
  - pip:
      - localtileserver>=0.10    # Optional: local raster tile server for Folium
